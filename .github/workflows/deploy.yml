name: Deploy
on:
  push:
    branches:
      - develop
jobs:
  build:
    name: Build and push docker image to registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis
      - name: Install Angular-CLI
        run: npm install -g @angular/cli
      - name: Install the dependencies of project
        run: npm install
      - name: Unit Test
        run: ng test --no-watch --browsers=ChromeHeadless
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/museum:dev-latest
            ${{ vars.DOCKERHUB_USERNAME }}/museum:dev-v-${{ github.run_number }}

  update:
    name: Update the latest version on the VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: launch the update command on the VPS
        uses: D3rHase/ssh-command-action@latest
        with:
          host: ${{ secrets.VPS_HOST }}
          user: ${{ secrets.VPS_USER }}
          private_key: ${{ secrets.VPS_PRIVATE_KEY }}
          command: ~/museum/update.sh
