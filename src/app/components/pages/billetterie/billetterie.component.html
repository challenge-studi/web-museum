<section>
  <h1 class="text-uppercase display-1 text-center fw-bold">billetterie</h1>
  <div class="d-flex justify-content-center">
    <div class="bandeau">
      <h4
        class="text-center text-white fw-bold display-4 display-md-3 display-lg-2"
      >
        COMPOSEZ VOTRE COMMANDE
      </h4>
    </div>
  </div>
  <div class="d-flex justify-content-center">
    <div class="compo-commande d-flex justify-content-center">
      <div class="div-tarifs">
        <h5 class="h5 text-center text-uppercase fw-bold">tarifs</h5>
        @for (price of listPrice; track price.id) {
          <app-checkin-ticket
            (onValueChanged)="updateListPrice($event.id, $event.count)"
            [ticketType]="price"
          />
        } @empty {
          <div>Nous n'avons pas de billet a vous proposer</div>
        }
        <div class="h5 text-center text-uppercase fw-bold">Prix total</div>
        <div class="h5 text-center text-uppercase fw-bold">
          {{ totalPrice }}€
        </div>
      </div>

      <div class="liseret"></div>
      <div class="div-visite">
        <h5 class="h5 text-center text-uppercase fw-bold">
          Veuillez selectionner votre Exposition
        </h5>
        <form>
          <div *ngFor="let exposition of expositions">
            <label>
              <input
                type="radio"
                name="selectedExpo"
                [value]="exposition"
                (change)="selectedExposition = exposition"
                [checked]="selectedExposition?.id === exposition.id"
              />
              {{ exposition.name }}
            </label>
          </div>
          <div class="total">
            <app-button name="commander" variant="secondary" />
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
