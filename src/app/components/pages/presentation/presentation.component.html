<div class="container mt-5">
  <div class="row">
    <div
      class="col-md-6 card-container"
      *ngFor="let exposition of expositions; let i = index"
    >
      <app-expo
        [dataCard]="exposition"
        [imageUrl]="imageUrls[i]"
        [layout]="layouts[i]"
      ></app-expo>
    </div>
  </div>
</div>
