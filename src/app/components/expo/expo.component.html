<div
  [ngClass]="[
    'card-container',
    layout() === 'bottom' ? 'image-bottom' : 'image-top',
  ]"
>
  <img
    *ngIf="imageUrl()"
    [src]="imageUrl()"
    class="card-image"
    [alt]="dataExpoCard()?.name || 'Illustration de l\'exposition'"
  />
  <div class="card-content">
    <div class="card-header text-white">{{ dataExpoCard()?.name }}</div>
    <div class="card-body">
      <h5 class="card-title">{{ dataExpoCard()?.description }}</h5>
      <p class="card-text">
        Du {{ dataExpoCard()?.departure_date | date: "dd/MM/yyyy" }} au
        {{ dataExpoCard()?.end_date | date: "dd/MM/yyyy" }}
      </p>
    </div>
  </div>
</div>
